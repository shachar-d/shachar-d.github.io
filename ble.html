<!DOCTYPE html>
<html>
<head>
    <title>ESP32 EQ Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        .slider-group { margin: 20px 0; }
        input[type=range] { width: 250px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>EQ Controller</h1>
        <button id="connectBtn">1. Connect Bluetooth</button>
        <hr>
        <div class="slider-group">
            <label>Bass: <span id="lVal">1.0</span></label>
            <input type="range" id="low" min="0" max="3" step="0.1" value="1.0">
        </div>
        <div class="slider-group">
            <label>Mid: <span id="mVal">1.0</span></label>
            <input type="range" id="mid" min="0" max="3" step="0.1" value="1.0">
        </div>
        <div class="slider-group">
            <label>Treble: <span id="hVal">1.0</span></label>
            <input type="range" id="high" min="0" max="3" step="0.1" value="1.0">
        </div>
    </div>

    <script>
        const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
        const CHAR_UUID    = '12345678-1234-5678-1234-56789abcdef1';
        let bleChar;

        document.getElementById('connectBtn').onclick = async () => {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32_EQ_Audio' }],
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleChar = await service.getCharacteristic(CHAR_UUID);
            alert("Connected!");
        };

        async function sendEQ() {
            if (!bleChar) return;
            const l = document.getElementById('low').value;
            const m = document.getElementById('mid').value;
            const h = document.getElementById('high').value;
            
            document.getElementById('lVal').innerText = l;
            document.getElementById('mVal').innerText = m;
            document.getElementById('hVal').innerText = h;

            const encoder = new TextEncoder();
            await bleChar.writeValue(encoder.encode(`${l},${m},${h}`));
        }

        ['low', 'mid', 'high'].forEach(id => {
            document.getElementById(id).oninput = sendEQ;
        });
    </script>
</body>
</html>
