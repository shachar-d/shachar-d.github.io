<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 EQ Remote</title>
    <style>
        :root { --primary: #007bff; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .hidden { display: none !important; }
        button#connectBtn { width: 100%; padding: 18px; font-size: 1.2rem; font-weight: bold; color: white; background: var(--primary); border: none; border-radius: 12px; cursor: pointer; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #2a2a2a; border-radius: 12px; }
        .switch { position: relative; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-switch { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider-switch:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-switch { background-color: var(--primary); }
        input:checked + .slider-switch:before { transform: translateX(26px); }
        select { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #444; border-radius: 10px; font-size: 1rem; margin-bottom: 20px; outline: none; }
        .slider-group { margin: 20px 0; text-align: left; }
        input[type=range] { width: 100%; height: 12px; border-radius: 10px; background: #333; outline: none; -webkit-appearance: none; margin-top: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 2px solid white; }
        .label-row { display: flex; justify-content: space-between; font-size: 1rem; color: #bbb; }
        .disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusHeader" class="hidden" style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.9rem; color:#00ff00;">
      <span>● Connected</span>
      <span id="rssiVal">Signal: -- dBm</span>
    </div>

    <button id="connectBtn">Connect to ESP32</button>

    <div id="mainInterface" class="hidden">
        <div class="switch-container">
            <span style="font-size: 1.1rem; font-weight: bold;">Equalizer ON</span>
            <label class="switch"><input type="checkbox" id="eqToggle" checked><span class="slider-switch"></span></label>
        </div>

        <div id="sliderBox">
            <select id="presetMenu">
                <option value="custom">Custom / Manual</option>
                <option value="1.8,1.0,1.4,0">Rock</option>
                <option value="1.5,1.2,1.1,0">Pop</option>
                <option value="1.4,0.9,1.6,0">Jazz</option>
                <option value="1.0,1.0,1.0,0">Flat / Center</option>
            </select>

            <div class="slider-group"><div class="label-row"><span>Bass</span><span id="lVal">1.0</span></div><input type="range" id="low" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="slider-group"><div class="label-row"><span>Mid</span><span id="mVal">1.0</span></div><input type="range" id="mid" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="slider-group"><div class="label-row"><span>Treble</span><span id="hVal">1.0</span></div><input type="range" id="high" min="0" max="3" step="0.1" value="1.0"></div>
            <div class="slider-group" style="border-top:1px solid #333; padding-top:15px;"><div class="label-row"><span>Balance</span><span id="balVal">Center</span></div><input type="range" id="balance" min="-0.5" max="0.5" step="0.05" value="0"></div>
        </div>
    </div>
</div>

<script>
    const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
    const CHAR_UUID    = '12345678-1234-5678-1234-56789abcdef1';
    let bleChar;

    const connectBtn = document.getElementById('connectBtn');
    const mainInterface = document.getElementById('mainInterface');
    const eqToggle = document.getElementById('eqToggle');
    const sliderBox = document.getElementById('sliderBox');
    const presetMenu = document.getElementById('presetMenu');

    window.onload = async () => {
        if (navigator.bluetooth && navigator.bluetooth.getDevices) {
            const devices = await navigator.bluetooth.getDevices();
            const myDevice = devices.find(d => d.name === 'ESP32_EQ_Audio');
            if (myDevice) {
                if (myDevice.gatt.connected) await myDevice.gatt.disconnect();
                connectBtn.innerText = "Reconnect to ESP32";
                startRSSIMonitor(myDevice);
            }
        }
        // Load sliders
        ['low', 'mid', 'high', 'balance'].forEach(id => {
            const saved = localStorage.getItem('eq_' + id);
            if (saved !== null) {
                document.getElementById(id).value = saved;
                // Update labels manually on load
                if(id === 'balance') document.getElementById('balVal').innerText = saved == 0 ? "Center" : (saved < 0 ? "L" : "R");
                else document.getElementById(id + 'Val').innerText = saved;
            }
        });

        // Load Toggle State
        const savedToggle = localStorage.getItem('eq_enabled');
        if (savedToggle !== null) eqToggle.checked = (savedToggle === 'true');

        // Check for known devices
        if (navigator.bluetooth && navigator.bluetooth.getDevices) {
            const devices = await navigator.bluetooth.getDevices();
            const myDevice = devices.find(d => d.name === 'ESP32_EQ_Audio');
            if (myDevice) {
                if (myDevice.gatt.connected) await myDevice.gatt.disconnect();
                connectBtn.innerText = "Reconnect to ESP32";
                startRSSIMonitor(myDevice);
            }
        }
    };

    async function startRSSIMonitor(device) {
        try {
            await device.watchAdvertisements();
            device.addEventListener('advertisementreceived', (e) => {
                document.getElementById('rssiVal').innerText = `Signal: ${e.rssi} dBm`;
            });
        } catch (e) { console.log("RSSI Watch failed"); }
    }

    async function sendData(msg) {
        if (!bleChar) return;
        const encoder = new TextEncoder();
        await bleChar.writeValue(encoder.encode(msg));
    }

    connectBtn.onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32_EQ_Audio' }],
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            bleChar = await (await server.getPrimaryService(SERVICE_UUID)).getCharacteristic(CHAR_UUID);
            document.getElementById('statusHeader').classList.remove('hidden');
            connectBtn.classList.add('hidden');
            mainInterface.classList.remove('hidden');
            syncAudio();
            device.addEventListener('gattserverdisconnected', () => location.reload());
        } catch (e) { alert("Connect Error: " + e); }
    };

    async function syncAudio() {
        const l = document.getElementById('low').value;
        const m = document.getElementById('mid').value;
        const h = document.getElementById('high').value;
        const b = document.getElementById('balance').value;
        // --- 2. SAVE TO LOCAL STORAGE ---
        localStorage.setItem('eq_low', l);
        localStorage.setItem('eq_mid', m);
        localStorage.setItem('eq_high', h);
        localStorage.setItem('eq_balance', b);
        localStorage.setItem('eq_enabled', eqToggle.checked);
        
        document.getElementById('lVal').innerText = l;
        document.getElementById('mVal').innerText = m;
        document.getElementById('hVal').innerText = h;
        document.getElementById('balVal').innerText = b == 0 ? "Center" : (b < 0 ? "Left "+Math.abs(b) : "Right "+b);

        if(!eqToggle.checked) {
            sliderBox.classList.add('disabled');
            await sendData("1.0,1.0,1.0,0.0");
        } else {
            sliderBox.classList.remove('disabled');
            await sendData(`${l},${m},${h},${b}`);
        }
    }

    eqToggle.onchange = syncAudio;
    presetMenu.onchange = () => {
        if(presetMenu.value === "custom") return;
        const p = presetMenu.value.split(',');
        ['low','mid','high','balance'].forEach((id, i) => document.getElementById(id).value = p[i]);
        syncAudio();
    };

    ['low', 'mid', 'high', 'balance'].forEach(id => {
        const el = document.getElementById(id);
        el.oninput = () => {
            if(id === 'balance') document.getElementById('balVal').innerText = el.value == 0 ? "Center" : (el.value < 0 ? "L" : "R");
            else document.getElementById(id + 'Val').innerText = el.value;
            presetMenu.value = "custom";
        };
        el.onchange = syncAudio;
    });
</script>
</body>
</html>
