<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom MS-50G Preset Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #connectBtn {
            background-color: #4CAF50;
            color: white;
        }
        #connectBtn:hover { background-color: #45a049; }
        #submitBtn {
            background-color: #008CBA;
            color: white;
        }
        #submitBtn:disabled {
            background-color: #555555;
            cursor: not-allowed;
            color: #888888;
        }
        #submitBtn:hover:not(:disabled) { background-color: #007bb5; }
        textarea {
            width: 100%;
            height: 400px;
            background-color: #121212;
            color: #00ff00;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        #status {
            margin-bottom: 10px;
            font-weight: bold;
            color: #ff9800;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MS-50G Preset Manager [v0.4]</h2>
    <div id="status">Status: Waiting to connect...</div>
    <div class="controls">
        <button id="connectBtn">Connect & Read Device</button>
        <button id="submitBtn" disabled>Submit to 192.168.4.1</button>
    </div>
    <textarea id="jsonOutput" readonly placeholder="JSON data will appear here..."></textarea>
</div>

<script>
    let zoomInput = null;
    let zoomOutput = null;
    let currentPatchIndex = 0;
    let retryCount = 0;
    let extractedPatches = [];
    let timeoutId = null;

    const DEVICE_ID = 0x58; 
    const MAX_RETRIES = 3;

    document.getElementById('connectBtn').addEventListener('click', startMidiProcess);
    document.getElementById('submitBtn').addEventListener('click', submitData);

    async function startMidiProcess() {
        if (!navigator.requestMIDIAccess) {
            updateStatus("Web MIDI not supported.", "red");
            return;
        }

        try {
            const midiAccess = await navigator.requestMIDIAccess({ sysex: true });
            
            // מציאת המכשיר
            zoomInput = Array.from(midiAccess.inputs.values()).find(i => i.name.includes('MS-50G') || i.name.includes('ZOOM'));
            zoomOutput = Array.from(midiAccess.outputs.values()).find(o => o.name.includes('MS-50G') || o.name.includes('ZOOM'));

            if (!zoomInput || !zoomOutput) {
                updateStatus("Device not found. Check USB.", "red");
                return;
            }

            // איפוס והכנה
            extractedPatches = [];
            currentPatchIndex = 0;
            retryCount = 0;
            zoomInput.onmidimessage = handleMidiMessage;
            
            updateStatus("Starting read...");
            requestNextPatch();

        } catch (err) {
            updateStatus("Error: " + err.message, "red");
        }
    }

    function requestNextPatch() {
        if (currentPatchIndex >= 48) {
            updateStatus("Success! Building JSON...", "green");
            generateJsonStructure();
            return;
        }

        updateStatus(`Reading ${currentPatchIndex + 1}/48 (Try ${retryCount + 1})...`);

        // 1. מעבר פאטץ' (Program Change)
        zoomOutput.send([0xC0, currentPatchIndex]);

        // 2. המתנה של 350ms שהמכשיר יסיים לטעון את הפאטץ'
        setTimeout(() => {
            // הגדרת ה-Timeout לפני שליחת הבקשה
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                handleTimeout();
            }, 1500);

            // 3. שליחת בקשת הנתונים (SysEx Request)
            zoomOutput.send([0xF0, 0x52, 0x00, DEVICE_ID, 0x29, 0xF7]);
        }, 350);
    }

    function handleMidiMessage(event) {
        const data = event.data;
        
        // בדיקה אם זו תשובת ה-SysEx המיוחלת (F0 52 00 58 28)
        if (data[0] === 0xF0 && data[1] === 0x52 && data[4] === 0x28) {
            clearTimeout(timeoutId);
            
            const name = decodePatchName(data);
            console.log(`Patch ${currentPatchIndex}: ${name}`);
            
            extractedPatches[currentPatchIndex] = name || `Patch ${currentPatchIndex + 1}`;
            
            // הצלחה - עוברים לפאטץ' הבא ומאפסים ניסיונות
            currentPatchIndex++;
            retryCount = 0;
            
            // הפסקה קטנה כדי לתת ל-Buffer להתנקות
            setTimeout(requestNextPatch, 50);
        }
    }

    function handleTimeout() {
        console.warn(`Timeout on patch ${currentPatchIndex + 1}`);
        if (retryCount < MAX_RETRIES) {
            retryCount++;
            requestNextPatch(); // ניסיון חוזר לאותו אינדקס
        } else {
            console.error("Giving up on this patch, moving to next.");
            extractedPatches[currentPatchIndex] = `Patch ${currentPatchIndex + 1} (Error)`;
            currentPatchIndex++;
            retryCount = 0;
            requestNextPatch();
        }
    }

    function decodePatchName(sysexData) {
        let payload = sysexData.slice(5, -1);
        let decoded = [];
        for (let i = 0; i < payload.length; i += 8) {
            let msb = payload[i];
            for (let j = 0; j < 7; j++) {
                if (i + j + 1 < payload.length) {
                    let byte = payload[i + j + 1];
                    if ((msb & (1 << j)) !== 0) byte |= 0x80;
                    decoded.push(byte);
                }
            }
        }
        // שליפת 10 התווים האחרונים (שם הפאטץ')
        let nameBytes = decoded.slice(110, 120);
        return String.fromCharCode(...nameBytes).replace(/[^\x20-\x7E]/g, '').trim();
    }

    function generateJsonStructure() {
        let banks = [];
        for (let i = 0; i < 6; i++) {
            let start = i * 8;
            let bankEffects = [];
            let bankNames = [];
            for (let j = 0; j < 8; j++) {
                bankEffects.push(start + j + 1);
                bankNames.push(extractedPatches[start + j] || `Patch ${start + j + 1}`);
            }
            banks.push({
                name: `Bank${i}`,
                effects: bankEffects,
                effectsDesc: bankNames,
                desc: "Default Bank"
            });
        }
        const finalJson = { banks };
        document.getElementById('jsonOutput').value = JSON.stringify(finalJson, null, 2);
        document.getElementById('submitBtn').disabled = false;
    }

    async function submitData() {
        const config = document.getElementById('jsonOutput').value;
        updateStatus("Submitting...");
        
        try {
            const response = await fetch('http://192.168.4.1/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `config=${encodeURIComponent(config)}`
            });
            if (response.ok) updateStatus("Sent successfully!", "green");
            else updateStatus("Server error: " + response.status, "red");
        } catch (e) {
            updateStatus("Post failed (CORS?): " + e.message, "red");
        }
    }

    function updateStatus(msg, color = "#ff9800") {
        const s = document.getElementById('status');
        s.innerText = "Status: " + msg;
        s.style.color = color;
    }
</script>

</body>
</html>
